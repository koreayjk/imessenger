<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<title>IM 메신저</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600&display=swap"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #F4ECDC;
  --surface: #FFFFFF;
  --s2: #FBF6EC;
  --s3: #F0E6D2;
  --ink: #25201A;
  --ink2: #6E6358;
  --ink3: #A39787;
  --border: #E7DCC4;
  --bs: #EEE7D6;
  --accent: #B5683C;
  --asoft: #E9C9B0;
  --adeep: #8B4A24;
  --sage: #6F8A5C;
  --sagsoft: #DCE3CE;
  --gold: #B89146;
  --rose: #B05865;
  --sidebar-w: 68px;
  --panel-w: 280px;
  --font: 'Pretendard Variable', Pretendard, -apple-system, system-ui, sans-serif;
  --serif: 'Noto Serif KR', serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--font); color: var(--ink); -webkit-font-smoothing: antialiased; overflow: hidden; }

/* ── 레이아웃 ── */
#app { display: flex; height: 100vh; }

/* 아이콘 사이드바 */
#sidebar {
  width: var(--sidebar-w);
  background: #2C1F14;
  display: flex; flex-direction: column; align-items: center;
  padding: 0 0 16px;
  flex-shrink: 0;
  z-index: 10;
}
#sidebar .logo {
  width: 100%; height: 56px;
  display: flex; align-items: center; justify-content: center;
  border-bottom: 1px solid rgba(255,255,255,.08);
  margin-bottom: 8px;
  font-family: var(--serif); font-size: 18px; color: #E9C9B0; font-weight: 500;
  letter-spacing: -.01em;
}
.sb-btn {
  width: 44px; height: 44px; border-radius: 14px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; cursor: pointer; margin-bottom: 4px;
  transition: background .15s;
  position: relative;
}
.sb-btn:hover { background: rgba(255,255,255,.08); }
.sb-btn.active { background: rgba(181,104,60,.35); }
.sb-btn svg { flex-shrink: 0; }
.sb-btn span { font-size: 9.5px; color: rgba(255,255,255,.5); font-weight: 500; }
.sb-btn.active span { color: #E9C9B0; }
.sb-btn .badge {
  position: absolute; top: 6px; right: 6px;
  min-width: 16px; height: 16px; border-radius: 8px; padding: 0 4px;
  background: var(--accent); color: white;
  font-size: 9px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}
.sb-spacer { flex: 1; }

/* 채널 패널 */
#panel {
  width: var(--panel-w);
  background: #F9F3E8;
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}
.panel-header {
  padding: 0 16px;
  height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.panel-header h2 { font-size: 16px; font-weight: 700; letter-spacing: -.02em; }
.panel-search {
  margin: 10px 12px;
  display: flex; align-items: center; gap: 7px;
  background: var(--surface); border-radius: 10px;
  padding: 7px 12px; border: 1px solid var(--border);
  flex-shrink: 0;
}
.panel-search input {
  border: 0; outline: 0; background: transparent;
  font: 13px var(--font); color: var(--ink); flex: 1;
}
.panel-search input::placeholder { color: var(--ink3); }
.panel-body { flex: 1; overflow-y: auto; padding-bottom: 16px; }
.panel-body::-webkit-scrollbar { width: 4px; }
.panel-body::-webkit-scrollbar-thumb { background: rgba(0,0,0,.12); border-radius: 2px; }
.section-label {
  padding: 14px 16px 5px;
  font-size: 10.5px; font-weight: 600; color: var(--ink3);
  letter-spacing: .05em; text-transform: uppercase;
  display: flex; align-items: center; justify-content: space-between;
}
.ch-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; margin: 0 6px;
  border-radius: 10px; cursor: pointer;
  transition: background .12s;
}
.ch-row:hover { background: rgba(0,0,0,.04); }
.ch-row.active { background: var(--asoft); }
.ch-icon {
  width: 36px; height: 36px; border-radius: 11px;
  background: var(--s3); display: flex; align-items: center;
  justify-content: center; font-size: 17px; flex-shrink: 0;
  color: var(--adeep); font-weight: 700;
}
.ch-row.active .ch-icon { background: rgba(139,74,36,.15); }
.ch-info { flex: 1; min-width: 0; }
.ch-name { font-size: 13.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ch-preview { font-size: 11.5px; color: var(--ink3); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ch-row.active .ch-preview { color: var(--adeep); opacity: .7; }
.unread-badge {
  min-width: 18px; height: 18px; border-radius: 9px; padding: 0 5px;
  background: var(--accent); color: white;
  font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

/* 메인 영역 */
#main {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  background: var(--bg);
  overflow: hidden;
}

/* 빈 화면 */
#empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--ink3); gap: 12px;
}
#empty .big { font-size: 48px; }
#empty h3 { font-size: 18px; font-weight: 600; color: var(--ink); }
#empty p { font-size: 14px; line-height: 1.6; text-align: center; max-width: 280px; }

/* 채팅 헤더 */
#chat-header {
  height: 56px; padding: 0 20px;
  display: flex; align-items: center; gap: 12px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.chat-header-icon {
  width: 36px; height: 36px; border-radius: 11px;
  background: var(--s3); display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0; color: var(--adeep); font-weight: 700;
}
.chat-header-info { flex: 1; min-width: 0; }
.chat-header-name { font-size: 15px; font-weight: 700; letter-spacing: -.01em; }
.chat-header-desc { font-size: 12px; color: var(--ink3); margin-top: 1px; }
.header-action {
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background .12s;
}
.header-action:hover { background: var(--s3); }

/* 메시지 영역 */
#msg-area {
  flex: 1; overflow-y: auto;
  padding: 20px 0 12px;
}
#msg-area::-webkit-scrollbar { width: 6px; }
#msg-area::-webkit-scrollbar-thumb { background: rgba(0,0,0,.1); border-radius: 3px; }
.date-divider {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 24px; color: var(--ink3); font-size: 12px; font-weight: 500;
}
.date-divider::before, .date-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.msg-row { display: flex; gap: 10px; padding: 3px 24px; }
.msg-row:hover { background: rgba(0,0,0,.02); }
.msg-row.mine { flex-direction: row-reverse; }
.msg-avatar { width: 36px; height: 36px; border-radius: 11px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 13px; color: white; margin-top: 2px; }
.msg-body { max-width: 60%; }
.msg-meta { display: flex; align-items: baseline; gap: 6px; margin-bottom: 4px; }
.msg-meta .name { font-size: 13px; font-weight: 600; }
.msg-meta .time { font-size: 11px; color: var(--ink3); }
.msg-row.mine .msg-meta { flex-direction: row-reverse; }
.bubble {
  display: inline-block; padding: 9px 14px;
  border-radius: 16px; font-size: 14px; line-height: 1.5;
  word-break: break-word; white-space: pre-wrap;
  background: var(--surface);
  border-top-left-radius: 4px;
}
.mine .bubble { background: var(--asoft); color: var(--adeep); border-top-left-radius: 16px; border-top-right-radius: 4px; }
.msg-row + .msg-row.same-sender { padding-top: 1px; }
.msg-row.same-sender .msg-avatar { visibility: hidden; }
.msg-row.same-sender .msg-meta { display: none; }

/* 입력창 */
#composer {
  padding: 12px 20px 16px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.composer-box {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg); border-radius: 14px;
  padding: 10px 14px; border: 1.5px solid var(--border);
  transition: border-color .15s;
}
.composer-box:focus-within { border-color: var(--accent); }
.composer-box input {
  flex: 1; border: 0; outline: 0; background: transparent;
  font: 14px var(--font); color: var(--ink);
}
.composer-box input::placeholder { color: var(--ink3); }
.send-btn {
  width: 34px; height: 34px; border-radius: 10px;
  background: var(--accent); display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; transition: opacity .15s;
}
.send-btn:hover { opacity: .85; }
.send-btn:not(.active) { background: var(--s3); pointer-events: none; }
.icon-btn {
  width: 30px; height: 30px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background .12s;
}
.icon-btn:hover { background: rgba(0,0,0,.06); }

/* 우측 멤버 패널 */
#right-panel {
  width: 240px; background: #FEFAF3;
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  flex-shrink: 0; overflow: hidden;
}
#right-panel h3 { font-size: 13px; font-weight: 600; padding: 18px 16px 8px; color: var(--ink3); letter-spacing: .04em; text-transform: uppercase; }
.member-row {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 14px;
}
.member-av { width: 30px; height: 30px; border-radius: 9px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: white; }
.member-name { font-size: 13px; font-weight: 500; }
.member-role { font-size: 11px; color: var(--ink3); }

/* 기도 / 홈 패널 */
#content-area { flex: 1; overflow-y: auto; padding: 24px; }
#content-area::-webkit-scrollbar { width: 6px; }
#content-area::-webkit-scrollbar-thumb { background: rgba(0,0,0,.1); border-radius: 3px; }
.prayer-card {
  background: var(--surface); border-radius: 16px;
  padding: 18px; margin-bottom: 14px;
  box-shadow: 0 1px 3px rgba(70,50,20,.06);
}
.prayer-card h4 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.prayer-card p { font-size: 13.5px; color: var(--ink2); line-height: 1.6; }
.pray-btn {
  margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--bs);
  display: flex; align-items: center; justify-content: space-between;
}
.pray-action {
  height: 30px; padding: 0 14px; border-radius: 15px;
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--sagsoft); color: #4D6940;
  font-size: 12.5px; font-weight: 600; cursor: pointer;
  transition: background .15s;
}
.pray-action.joined { background: var(--sage); color: white; }

/* 인증 화면 */
#auth-screen {
  position: fixed; inset: 0; z-index: 100;
  background: radial-gradient(900px at 30% 30%, #F4EDDA, transparent 60%), #E8DFC8;
  display: flex; align-items: center; justify-content: center;
}
.auth-wrap {
  display: flex; gap: 0;
  background: var(--surface); border-radius: 28px;
  box-shadow: 0 24px 70px rgba(70,50,20,.18);
  overflow: hidden; width: 820px; min-height: 520px;
}
.auth-left {
  width: 320px; flex-shrink: 0;
  background: linear-gradient(160deg, #2C1F14 0%, #4A2E1A 100%);
  padding: 48px 40px; display: flex; flex-direction: column;
  justify-content: space-between;
}
.auth-left .brand { font-family: var(--serif); font-size: 32px; color: #E9C9B0; font-weight: 500; margin-bottom: 10px; }
.auth-left .tagline { font-size: 14px; color: rgba(255,255,255,.55); line-height: 1.7; }
.auth-left .features { display: flex; flex-direction: column; gap: 12px; }
.auth-left .feat { display: flex; align-items: center; gap: 10px; color: rgba(255,255,255,.7); font-size: 13.5px; }
.auth-left .feat-icon { width: 32px; height: 32px; border-radius: 10px; background: rgba(255,255,255,.1); display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
.auth-right { flex: 1; padding: 48px 44px; display: flex; flex-direction: column; }
.auth-tabs { display: flex; gap: 0; margin-bottom: 32px; border-bottom: 2px solid var(--border); }
.auth-tab {
  padding: 10px 20px 12px; font-size: 15px; font-weight: 600;
  cursor: pointer; color: var(--ink3); border-bottom: 2px solid transparent;
  margin-bottom: -2px; transition: color .15s, border-color .15s;
}
.auth-tab.active { color: var(--adeep); border-bottom-color: var(--accent); }
.auth-form { display: flex; flex-direction: column; gap: 10px; flex: 1; }
.auth-form h2 { font-size: 22px; font-weight: 700; letter-spacing: -.02em; margin-bottom: 4px; }
.auth-form .sub { font-size: 13.5px; color: var(--ink3); margin-bottom: 8px; line-height: 1.5; }
.field-row { display: flex; gap: 10px; }
.field-row .auth-input { flex: 1; }
.auth-input {
  width: 100%; padding: 12px 15px; border-radius: 12px;
  border: 1.5px solid var(--border); background: var(--bg);
  font: 14.5px var(--font); color: var(--ink); outline: none;
  transition: border-color .15s;
}
.auth-input:focus { border-color: var(--accent); background: white; }
.auth-input::placeholder { color: var(--ink3); }
.auth-btn {
  width: 100%; padding: 14px; border-radius: 12px; border: none;
  background: var(--accent); color: white;
  font: 600 15px var(--font); cursor: pointer; transition: opacity .15s;
  margin-top: 4px;
}
.auth-btn:hover { opacity: .88; }
.auth-btn.secondary { background: var(--s3); color: var(--adeep); }
.auth-msg { font-size: 12.5px; text-align: center; min-height: 18px; }
.auth-msg.error { color: var(--rose); }
.auth-msg.success { color: var(--sage); }

/* 유틸 */
.scroll-none::-webkit-scrollbar { display: none; }
.scroll-none { scrollbar-width: none; }
[data-tap] { cursor: pointer; }
[data-tap]:active { opacity: .7; }
.fade { animation: fadeIn .2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>

<!-- 인증 화면 -->
<div id="auth-screen">
  <div class="auth-wrap">
    <!-- 왼쪽 브랜드 -->
    <div class="auth-left">
      <div>
        <div class="brand">IM 메신저</div>
        <div class="tagline">선교회 가족들이 한 자리에서 소통하고, 함께 기도하는 공동체 메신저</div>
      </div>
      <div class="features">
        <div class="feat"><div class="feat-icon">💬</div>실시간 채팅 & 채널</div>
        <div class="feat"><div class="feat-icon">🙏</div>중보기도 나눔</div>
        <div class="feat"><div class="feat-icon">📖</div>말씀 묵상 공유</div>
        <div class="feat"><div class="feat-icon">👥</div>공동체 멤버 관리</div>
      </div>
    </div>

    <!-- 오른쪽 폼 -->
    <div class="auth-right">
      <div class="auth-tabs">
        <div class="auth-tab active" id="tab-signin" onclick="switchTab('signin')">로그인</div>
        <div class="auth-tab" id="tab-signup" onclick="switchTab('signup')">회원가입</div>
      </div>

      <!-- 로그인 폼 -->
      <div class="auth-form" id="form-signin">
        <h2>다시 만나서 반가워요 🌿</h2>
        <div class="sub">이메일과 비밀번호로 로그인하세요</div>
        <input class="auth-input" id="si-email" type="email" placeholder="이메일 주소" onkeydown="if(event.key==='Enter')doSignIn()"/>
        <input class="auth-input" id="si-pw" type="password" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doSignIn()"/>
        <button class="auth-btn" onclick="doSignIn()" id="si-btn">로그인</button>
        <div class="auth-msg error" id="si-msg"></div>
        <div style="text-align:center;font-size:13px;color:var(--ink3);margin-top:4px">
          계정이 없으신가요? <span onclick="switchTab('signup')" style="color:var(--adeep);font-weight:600;cursor:pointer">회원가입</span>
        </div>
      </div>

      <!-- 회원가입 폼 -->
      <div class="auth-form" id="form-signup" style="display:none">
        <h2>IM 메신저 가입하기 ✨</h2>
        <div class="sub">아래 정보를 입력해서 가입해주세요</div>
        <input class="auth-input" id="su-email" type="email" placeholder="이메일 주소"/>
        <input class="auth-input" id="su-pw" type="password" placeholder="비밀번호 (6자 이상)"/>
        <div class="field-row">
          <input class="auth-input" id="su-nick" placeholder="닉네임 (예: 은혜)"/>
          <input class="auth-input" id="su-birth" type="date" placeholder="생년월일" style="color:var(--ink2)"/>
        </div>
        <button class="auth-btn" onclick="doSignUp()" id="su-btn">가입하기</button>
        <div class="auth-msg" id="su-msg"></div>
        <div style="text-align:center;font-size:13px;color:var(--ink3);margin-top:4px">
          이미 계정이 있으신가요? <span onclick="switchTab('signin')" style="color:var(--adeep);font-weight:600;cursor:pointer">로그인</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 메인 앱 -->
<div id="app" style="display:none">

  <!-- 1) 아이콘 사이드바 -->
  <div id="sidebar">
    <div class="logo">IM</div>
    <div class="sb-btn active" id="sb-chat" onclick="setMode('chat')" title="채팅">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.85)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6.5a3 3 0 013-3h10a3 3 0 013 3V14a3 3 0 01-3 3H10l-4 3.5V17a3 3 0 01-2-2.83V6.5z"/></svg>
      <span>채팅</span>
    </div>
    <div class="sb-btn" id="sb-prayer" onclick="setMode('prayer')" title="기도제목">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v9"/><path d="M9 12h6"/><path d="M7 18c0-3 2-5 5-5s5 2 5 5"/><path d="M5 21h14"/></svg>
      <span>기도</span>
    </div>
    <div class="sb-btn" id="sb-home" onclick="setMode('home')" title="홈">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5L12 4l9 7.5"/><path d="M5 10v10h14V10"/></svg>
      <span>홈</span>
    </div>
    <div class="sb-spacer"></div>
    <div class="sb-btn" id="sb-me" title="내 프로필" style="margin-bottom:4px">
      <div id="my-av" style="width:36px;height:36px;border-radius:11px;background:#8B4A24;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;color:white">?</div>
    </div>
    <div class="sb-btn" onclick="doLogout()" title="로그아웃" style="margin-bottom:0">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.45)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
      <span>나가기</span>
    </div>
  </div>

  <!-- 2) 채널 패널 -->
  <div id="panel">
    <div class="panel-header">
      <h2 id="panel-title">채팅</h2>
      <div class="header-action" title="새 채널">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--ink3)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      </div>
    </div>
    <div class="panel-search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--ink3)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
      <input id="searchInput" placeholder="검색" oninput="filterChannels(this.value)"/>
    </div>
    <div class="panel-body" id="panel-body"></div>
  </div>

  <!-- 3) 메인 콘텐츠 -->
  <div id="main">
    <!-- 채팅 뷰 -->
    <div id="chat-view" style="display:flex;flex-direction:column;height:100%">
      <div id="empty">
        <div class="big">💬</div>
        <h3>채널을 선택해주세요</h3>
        <p>왼쪽에서 채널을 클릭하면 대화를 시작할 수 있어요</p>
      </div>
      <div id="chat-active" style="display:none;flex-direction:column;height:100%">
        <div id="chat-header">
          <div class="chat-header-icon" id="ch-icon">📢</div>
          <div class="chat-header-info">
            <div class="chat-header-name" id="ch-name">채널명</div>
            <div class="chat-header-desc" id="ch-desc">설명</div>
          </div>
          <div class="header-action" onclick="toggleRightPanel()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--ink3)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="9" r="3.5"/><path d="M3 19c0-3 3-5 6-5s6 2 6 5"/><circle cx="17" cy="8" r="2.5"/><path d="M15 19c0-2 2-3.5 4-3.5"/></svg>
          </div>
          <div class="header-action">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--ink3)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
          </div>
        </div>
        <div id="msg-area"></div>
        <div id="composer">
          <div class="composer-box">
            <div class="icon-btn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--ink3)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            </div>
            <input id="msgInput" placeholder="메시지 보내기 (Enter)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}" oninput="updateSendBtn()"/>
            <div class="icon-btn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--ink3)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8.5 14.5a4.5 4.5 0 007 0"/><circle cx="9" cy="10" r="1" fill="var(--ink3)"/><circle cx="15" cy="10" r="1" fill="var(--ink3)"/></svg>
            </div>
            <div class="send-btn" id="sendBtn" onclick="sendMsg()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12L20 4l-6 16-3-7-7-1z"/></svg>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 기도 뷰 -->
    <div id="prayer-view" style="display:none;flex-direction:column;height:100%">
      <div id="chat-header" style="position:static">
        <div class="chat-header-icon">🤲</div>
        <div class="chat-header-info">
          <div class="chat-header-name">기도제목</div>
          <div class="chat-header-desc">함께 기도해요</div>
        </div>
        <button onclick="showPrayerForm()" style="margin-left:auto;height:34px;padding:0 16px;border-radius:10px;border:none;background:var(--sage);color:white;font:600 13px var(--font);cursor:pointer">+ 기도제목 올리기</button>
      </div>
      <div id="content-area" id="prayer-list"></div>
    </div>

    <!-- 홈 뷰 -->
    <div id="home-view" style="display:none;flex-direction:column;height:100%">
      <div style="height:56px;padding:0 20px;display:flex;align-items:center;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0">
        <div style="font-size:16px;font-weight:700">홈</div>
      </div>
      <div id="content-area" style="flex:1;overflow-y:auto;padding:28px 32px;max-width:700px"></div>
    </div>
  </div>

  <!-- 4) 우측 멤버 패널 -->
  <div id="right-panel">
    <h3>멤버</h3>
    <div id="member-list" style="overflow-y:auto;flex:1"></div>
  </div>

</div>

<script>
// ── Supabase ──
const SUPABASE_URL = 'https://ziatqkjlafucqtwshhla.supabase.co';
const SUPABASE_KEY = 'sb_publishable_anybo402FSdDKMNiWcQzSA_oc7LIzZC';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let ME = null;
let channels = [];
let members = {};
let currentChannel = null;
let realtimeSub = null;
let mode = 'chat';
let prayerJoined = {};
let prayers = [];

// ── 탭 전환 ──
function switchTab(t) {
  document.getElementById('tab-signin').classList.toggle('active', t==='signin');
  document.getElementById('tab-signup').classList.toggle('active', t==='signup');
  document.getElementById('form-signin').style.display = t==='signin' ? 'flex' : 'none';
  document.getElementById('form-signup').style.display = t==='signup' ? 'flex' : 'none';
}

// ── 회원가입 ──
async function doSignUp() {
  const email = document.getElementById('su-email').value.trim();
  const pw    = document.getElementById('su-pw').value;
  const nick  = document.getElementById('su-nick').value.trim();
  const birth = document.getElementById('su-birth').value;
  const msg   = document.getElementById('su-msg');
  const btn   = document.getElementById('su-btn');

  if (!email || !pw || !nick || !birth) { msg.className='auth-msg error'; msg.textContent='모든 항목을 입력해주세요'; return; }
  if (pw.length < 6) { msg.className='auth-msg error'; msg.textContent='비밀번호는 6자 이상이어야 해요'; return; }

  btn.textContent='가입 중...'; btn.disabled=true;
  msg.textContent='';

  try {
    // Supabase Auth 가입
    const { data: authData, error: authErr } = await sb.auth.signUp({ email, password: pw });
    if (authErr) throw authErr;

    const uid = authData.user?.id;
    if (!uid) throw new Error('가입 처리 중 오류가 발생했어요');

    // members 테이블에 프로필 저장
    const colors = ['#B5683C','#6F8A5C','#5A7C8B','#7B6BA0','#B89146','#B05865','#4C7363','#8B4A24'];
    const color = colors[Math.floor(Math.random()*colors.length)];
    const { data: member, error: mErr } = await sb.from('members').insert({
      id: uid,
      name: nick,
      initials: nick[0],
      color,
      role: '멤버',
      email,
      birth_date: birth,
    }).select().single();

    if (mErr) throw mErr;

    msg.className='auth-msg success';
    msg.textContent='가입 완료! 이메일 인증 후 로그인해주세요 ✅';
    btn.textContent='가입하기'; btn.disabled=false;

    // 이메일 인증 없이 바로 로그인 허용 (개발 단계)
    if (authData.session) {
      ME = member;
      enterApp();
    } else {
      setTimeout(() => switchTab('signin'), 2000);
    }
  } catch(e) {
    msg.className='auth-msg error';
    msg.textContent = e.message?.includes('already') ? '이미 가입된 이메일이에요' : (e.message || '오류가 발생했어요');
    btn.textContent='가입하기'; btn.disabled=false;
  }
}

// ── 로그인 ──
async function doSignIn() {
  const email = document.getElementById('si-email').value.trim();
  const pw    = document.getElementById('si-pw').value;
  const msg   = document.getElementById('si-msg');
  const btn   = document.getElementById('si-btn');

  if (!email || !pw) { msg.textContent='이메일과 비밀번호를 입력해주세요'; return; }

  btn.textContent='로그인 중...'; btn.disabled=true;
  msg.textContent='';

  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
    if (error) throw error;

    const uid = data.user.id;
    const { data: member, error: mErr } = await sb.from('members').select('*').eq('id', uid).single();
    if (mErr || !member) throw new Error('프로필을 찾을 수 없어요. 다시 가입해주세요.');

    ME = member;
    enterApp();
  } catch(e) {
    msg.textContent = e.message?.includes('Invalid') ? '이메일 또는 비밀번호가 틀렸어요' : (e.message || '오류가 발생했어요');
    btn.textContent='로그인'; btn.disabled=false;
  }
}

// ── 앱 진입 ──
function enterApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('my-av').textContent = ME.initials || ME.name[0];
  document.getElementById('my-av').style.background = ME.color || '#8B4A24';
  document.getElementById('my-av').title = ME.name;
  init();
}

// ── 포맷 ──function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const h = d.getHours(), m = String(d.getMinutes()).padStart(2,'0');
  return `${h<12?'오전':'오후'} ${h%12||12}:${m}`;
}



// ── 초기화 ──
async function init() {
  // 채널 로드
  const { data: chs } = await sb.from('channels').select('*').order('pinned', {ascending:false}).order('created_at');
  channels = chs || [];

  // 멤버 로드
  const { data: mems } = await sb.from('members').select('*');
  members = {};
  (mems||[]).forEach(m => { members[m.id] = m; });

  renderPanel();
  renderMembers();
  setMode('chat');
}

// ── 사이드바 모드 전환 ──
function setMode(m) {
  mode = m;
  ['chat','prayer','home'].forEach(x => {
    document.getElementById('sb-'+x).classList.toggle('active', x===m);
    const svg = document.getElementById('sb-'+x).querySelector('svg');
    if (svg) svg.style.stroke = x===m ? 'rgba(255,255,255,.85)' : 'rgba(255,255,255,.5)';
    const span = document.getElementById('sb-'+x).querySelector('span');
    if (span) span.style.color = x===m ? '#E9C9B0' : 'rgba(255,255,255,.5)';
  });
  document.getElementById('chat-view').style.display = m==='chat' ? 'flex' : 'none';
  document.getElementById('prayer-view').style.display = m==='prayer' ? 'flex' : 'none';
  document.getElementById('home-view').style.display = m==='home' ? 'flex' : 'none';

  if (m==='prayer') { loadPrayers(); renderPrayerPanel(); }
  if (m==='home') renderHome();
  if (m==='chat') { renderPanel(); }
  document.getElementById('panel-title').textContent = {chat:'채팅',prayer:'기도제목',home:'홈'}[m];
}

// ── 채널 패널 렌더 ──
function renderPanel() {
  const pinned = channels.filter(c=>c.pinned);
  const rest = channels.filter(c=>!c.pinned);
  let html = '';
  if (pinned.length) {
    html += `<div class="section-label"><span>📌 고정</span></div>`;
    pinned.forEach(ch => html += chRow(ch));
  }
  if (rest.length) {
    html += `<div class="section-label"><span>토픽</span></div>`;
    rest.forEach(ch => html += chRow(ch));
  }
  document.getElementById('panel-body').innerHTML = html;
}

function chRow(ch) {
  const active = currentChannel && currentChannel.id === ch.id;
  return `<div class="ch-row${active?' active':''}" onclick="openChannel('${ch.id}')">
    <div class="ch-icon">${ch.emoji||'#'}</div>
    <div class="ch-info">
      <div class="ch-name">${ch.name}</div>
      <div class="ch-preview">${ch.description||''}</div>
    </div>
  </div>`;
}

function filterChannels(q) {
  const filtered = channels.filter(c => c.name.includes(q) || (c.description||'').includes(q));
  let html = '';
  filtered.forEach(ch => html += chRow(ch));
  document.getElementById('panel-body').innerHTML = html || '<div style="padding:20px;text-align:center;color:var(--ink3);font-size:13px">검색 결과가 없어요</div>';
}

// ── 채널 열기 ──
async function openChannel(id) {
  currentChannel = channels.find(c=>c.id===id);
  renderPanel();

  document.getElementById('empty').style.display = 'none';
  document.getElementById('chat-active').style.display = 'flex';
  document.getElementById('ch-icon').textContent = currentChannel.emoji || '#';
  document.getElementById('ch-name').textContent = currentChannel.name;
  document.getElementById('ch-desc').textContent = currentChannel.description || '';

  // 메시지 로드
  const { data: msgs } = await sb.from('messages').select('*')
    .eq('channel_id', id).order('created_at', {ascending:true}).limit(200);
  renderMessages(msgs || []);

  // 실시간 구독
  if (realtimeSub) sb.removeChannel(realtimeSub);
  realtimeSub = sb.channel(`msg:${id}`)
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'messages', filter:`channel_id=eq.${id}` },
      payload => appendMessage(payload.new))
    .subscribe();
}

// ── 메시지 렌더 ──
function renderMessages(msgs) {
  const area = document.getElementById('msg-area');
  if (!msgs.length) {
    area.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--ink3);gap:10px">
      <div style="font-size:40px">${currentChannel.emoji||'💬'}</div>
      <div style="font-size:15px;font-weight:600;color:var(--ink)">${currentChannel.name} 채널에 오신 것을 환영해요!</div>
      <div style="font-size:13px">첫 번째 메시지를 보내보세요</div>
    </div>`;
    return;
  }
  let html = `<div class="date-divider">오늘</div>`;
  msgs.forEach((m, i) => { html += msgHtml(m, msgs[i-1]); });
  area.innerHTML = html;
  area.scrollTop = area.scrollHeight;
}

function appendMessage(m) {
  const area = document.getElementById('msg-area');
  // 빈 화면 제거
  if (area.querySelector('div[style*="flex-direction:column"]')) {
    area.innerHTML = `<div class="date-divider">오늘</div>`;
  }
  const prev = area.querySelector('.msg-row:last-child');
  const prevId = prev ? prev.dataset.sender : null;
  area.insertAdjacentHTML('beforeend', msgHtml(m, prevId ? {sender_id: prevId} : null));
  area.scrollTop = area.scrollHeight;
}

function msgHtml(m, prev) {
  const isMine = m.sender_id === ME.id;
  const sender = members[m.sender_id] || { name: m.sender_name||'알 수 없음', initials: (m.sender_name||'?')[0], color:'#999' };
  const sameAsPrev = prev && prev.sender_id === m.sender_id;
  const avStyle = `background:${sender.color}`;
  if (isMine) {
    return `<div class="msg-row mine${sameAsPrev?' same-sender':''}" data-sender="${m.sender_id}">
      <div class="msg-avatar" style="${avStyle}">${sender.initials}</div>
      <div class="msg-body">
        ${!sameAsPrev ? `<div class="msg-meta"><span class="name">${sender.name}</span><span class="time">${fmtTime(m.created_at)}</span></div>` : ''}
        <div class="bubble">${escHtml(m.text)}</div>
      </div>
    </div>`;
  }
  return `<div class="msg-row${sameAsPrev?' same-sender':''}" data-sender="${m.sender_id}">
    <div class="msg-avatar" style="${avStyle}">${sender.initials}</div>
    <div class="msg-body">
      ${!sameAsPrev ? `<div class="msg-meta"><span class="name">${sender.name}</span><span class="time">${fmtTime(m.created_at)}</span></div>` : ''}
      <div class="bubble">${escHtml(m.text)}</div>
    </div>
  </div>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ── 메시지 전송 ──
async function sendMsg() {
  const inp = document.getElementById('msgInput');
  const text = inp.value.trim();
  if (!text || !currentChannel) return;
  inp.value = '';
  updateSendBtn();
  await sb.from('messages').insert({ channel_id: currentChannel.id, sender_id: ME.id, sender_name: ME.name, text, kind:'text' });
}

function updateSendBtn() {
  const v = document.getElementById('msgInput').value.trim();
  document.getElementById('sendBtn').classList.toggle('active', !!v);
}

// ── 멤버 패널 ──
function renderMembers() {
  const list = Object.values(members);
  document.getElementById('member-list').innerHTML = list.map(m =>
    `<div class="member-row">
      <div class="member-av" style="background:${m.color||'#999'}">${m.initials||m.name[0]}</div>
      <div><div class="member-name">${m.name}</div><div class="member-role">${m.role||'멤버'}</div></div>
    </div>`
  ).join('');
}

function toggleRightPanel() {
  const rp = document.getElementById('right-panel');
  rp.style.display = rp.style.display === 'none' ? 'flex' : 'none';
}

// ── 기도제목 ──
async function loadPrayers() {
  const { data } = await sb.from('prayers').select('*').order('created_at', {ascending:false});
  prayers = data || [];
  renderPrayerContent();
}

function renderPrayerPanel() {
  const colors = ['#B5683C','#6F8A5C','#5A7C8B','#7B6BA0','#B89146'];
  let html = '';
  document.getElementById('panel-body').innerHTML = prayers.length
    ? prayers.map((p,i) => `<div class="ch-row${false?' active':''}" onclick="scrollToPrayer('${p.id}')">
        <div class="ch-icon" style="background:${colors[i%colors.length]};color:white;font-size:13px">${p.member_name?.[0]||'?'}</div>
        <div class="ch-info"><div class="ch-name">${p.title}</div><div class="ch-preview">${p.member_name} · ${p.scope}</div></div>
      </div>`).join('')
    : '<div style="padding:20px;text-align:center;color:var(--ink3);font-size:13px">기도제목이 없어요</div>';
}

function renderPrayerContent() {
  const colors = ['#B5683C','#6F8A5C','#5A7C8B','#7B6BA0','#B89146'];
  const area = document.getElementById('content-area');
  if (!area) return;
  if (!prayers.length) {
    area.innerHTML = `<div style="text-align:center;color:var(--ink3);padding:60px 0"><div style="font-size:40px;margin-bottom:12px">🙏</div><div style="font-size:15px;font-weight:600;color:var(--ink)">기도제목이 없어요</div><div style="font-size:13px;margin-top:6px">첫 번째 기도제목을 올려보세요</div></div>`;
    return;
  }
  area.innerHTML = prayers.map((p,i) => `
    <div class="prayer-card fade" id="prayer-${p.id}">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <div style="width:32px;height:32px;border-radius:10px;background:${colors[i%colors.length]};color:white;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600">${(p.member_name||'?')[0]}</div>
        <div><div style="font-size:13.5px;font-weight:600">${p.member_name}</div><div style="font-size:11.5px;color:var(--ink3)">${p.scope} · ${new Date(p.created_at).toLocaleDateString('ko-KR')}</div></div>
      </div>
      <h4>${p.title}</h4>
      <p>${p.body||''}</p>
      <div class="pray-btn">
        <div style="font-size:12.5px;color:var(--ink2)"><b style="color:var(--ink);font-weight:600" id="cnt-${p.id}">${p.prayer_count||0}명</b> 함께 기도 중</div>
        <div class="pray-action${prayerJoined[p.id]?' joined':''}" onclick="togglePrayer('${p.id}',${p.prayer_count||0})" id="pbtn-${p.id}">
          ${prayerJoined[p.id]?'✓ 함께 기도 중':'🙏 함께 기도'}
        </div>
      </div>
    </div>`).join('');
}

async function togglePrayer(id, currentCount) {
  const was = prayerJoined[id];
  prayerJoined[id] = !was;
  const newCount = (currentCount||0) + (was?-1:1);
  await sb.from('prayers').update({ prayer_count: newCount }).eq('id', id);
  const cnt = document.getElementById('cnt-'+id);
  const btn = document.getElementById('pbtn-'+id);
  if (cnt) cnt.textContent = newCount+'명';
  if (btn) { btn.className = 'pray-action'+(prayerJoined[id]?' joined':''); btn.textContent = prayerJoined[id]?'✓ 함께 기도 중':'🙏 함께 기도'; }
  // count 업데이트
  const p = prayers.find(x=>x.id===id);
  if (p) p.prayer_count = newCount;
}

function showPrayerForm() {
  const area = document.getElementById('content-area');
  const form = document.createElement('div');
  form.className = 'prayer-card fade';
  form.style.marginBottom = '14px';
  form.innerHTML = `
    <div style="font-size:14px;font-weight:600;margin-bottom:12px">기도제목 올리기</div>
    <input id="ptitle" placeholder="제목" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font:14px var(--font);outline:none;margin-bottom:8px"/>
    <textarea id="pbody" placeholder="기도 내용을 나눠주세요..." rows="3" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font:14px var(--font);outline:none;resize:none;margin-bottom:8px"></textarea>
    <div style="display:flex;gap:8px;margin-bottom:10px">${['전체','청년부','미디어팀','주일학교'].map(s=>`<div onclick="selectScope(this,'${s}')" data-scope="${s}" style="height:28px;padding:0 12px;border-radius:999px;font-size:12px;display:flex;align-items:center;background:var(--s3);color:var(--ink2);cursor:pointer">${s}</div>`).join('')}</div>
    <div style="display:flex;gap:8px">
      <div onclick="this.closest('.prayer-card').remove()" style="flex:1;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:var(--s3);font-size:13.5px;color:var(--ink2);cursor:pointer">취소</div>
      <div onclick="submitPrayer(this)" style="flex:2;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:var(--sage);color:white;font-size:13.5px;font-weight:600;cursor:pointer">올리기</div>
    </div>`;
  area.prepend(form);
  // 기본 범위 선택
  form.querySelector('[data-scope="전체"]').style.background = 'var(--sage)';
  form.querySelector('[data-scope="전체"]').style.color = 'white';
  form.querySelector('[data-scope="전체"]').dataset.selected = '1';
  area.scrollTop = 0;
}

function selectScope(el, scope) {
  el.closest('div').querySelectorAll('[data-scope]').forEach(x => { x.style.background='var(--s3)'; x.style.color='var(--ink2)'; delete x.dataset.selected; });
  el.style.background = 'var(--sage)'; el.style.color = 'white'; el.dataset.selected = '1';
}

async function submitPrayer(btn) {
  const form = btn.closest('.prayer-card');
  const title = form.querySelector('#ptitle').value.trim();
  const body = form.querySelector('#pbody').value.trim();
  const scopeEl = form.querySelector('[data-selected]');
  const scope = scopeEl ? scopeEl.dataset.scope : '전체';
  if (!title) { form.querySelector('#ptitle').style.borderColor='var(--rose)'; return; }
  await sb.from('prayers').insert({ member_id: ME.id, member_name: ME.name, title, body, scope, prayer_count: 0 });
  form.remove();
  loadPrayers();
}

// ── 홈 ──
function renderHome() {
  const area = document.getElementById('content-area');
  if (!area) return;
  const d = new Date();
  const wk = ['일','월','화','수','목','금','토'];
  area.innerHTML = `
    <div style="margin-bottom:24px">
      <div style="font-size:13px;color:var(--ink3);margin-bottom:4px">${d.getMonth()+1}월 ${d.getDate()}일 ${wk[d.getDay()]}요일</div>
      <div style="font-size:26px;font-weight:700;letter-spacing:-.02em">샬롬, <span style="color:var(--adeep)">${ME.name.split(' ')[0]}</span> 형제/자매님 👋</div>
    </div>
    <div style="border-radius:20px;background:linear-gradient(160deg,#FAF3E1,#F1E3C5);border:1px solid #E6D6B4;padding:24px 28px;margin-bottom:20px;position:relative;overflow:hidden">
      <div style="position:absolute;top:-30px;right:-16px;font-size:120px;color:rgba(139,74,36,.06);line-height:1">"</div>
      <div style="font-size:11.5px;font-weight:600;color:var(--adeep);letter-spacing:.04em;margin-bottom:12px">✦ 오늘의 말씀</div>
      <div style="font-family:var(--serif);font-size:17px;line-height:1.7;color:var(--ink)">여호와는 나의 목자시니 내게 부족함이 없으리로다. 그가 나를 푸른 풀밭에 누이시며 쉴 만한 물가로 인도하시는도다.</div>
      <div style="margin-top:14px;font-size:13px;color:var(--ink2);font-weight:500">— 시편 23:1-2</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px">
      ${[{label:'채팅 채널',val:channels.length+'개',icon:'💬',tab:'chat'},{label:'기도제목',val:'올라온 글',icon:'🙏',tab:'prayer'},{label:'멤버',val:Object.keys(members).length+'명',icon:'👥',tab:'chat'}].map(c=>`
      <div onclick="setMode('${c.tab}')" style="border-radius:16px;background:var(--surface);padding:18px;box-shadow:0 1px 4px rgba(70,50,20,.07);cursor:pointer;transition:box-shadow .15s" onmouseover="this.style.boxShadow='0 4px 14px rgba(70,50,20,.1)'" onmouseout="this.style.boxShadow='0 1px 4px rgba(70,50,20,.07)'">
        <div style="font-size:26px;margin-bottom:10px">${c.icon}</div>
        <div style="font-size:20px;font-weight:700;color:var(--adeep)">${c.val}</div>
        <div style="font-size:13px;color:var(--ink3);margin-top:3px">${c.label}</div>
      </div>`).join('')}
    </div>`;
}

// ── 세션 복원 ──
window.addEventListener('load', async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    const { data: member } = await sb.from('members').select('*').eq('id', session.user.id).single();
    if (member) {
      ME = member;
      enterApp();
      return;
    }
  }
  // 세션 없으면 로그인 화면 유지
});

// 로그아웃
async function doLogout() {
  await sb.auth.signOut();
  ME = null;
  currentChannel = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('si-email').value = '';
  document.getElementById('si-pw').value = '';
  document.getElementById('si-msg').textContent = '';
}
</script>
</body>
</html>
